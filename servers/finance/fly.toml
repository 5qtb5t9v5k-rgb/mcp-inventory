app = 'finance-mcp-jr'
primary_region = 'arn'

[build]

[env]
  PORT = '8080'
  FINANCE_CSV_PATH = '/data/transactions.csv'

[mounts]
  source = "finance_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
